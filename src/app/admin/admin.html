<mat-card>
    <mat-card-header>
        <mat-card-title>Connexion Admin</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()">
            <div class="inputFlex">
                <label for="user">Utilisateur</label>
                <input type="text" formControlName="user" name="user" id="user">
            </div>
            <div class="inputFlex">
                <label for="password">Mot de passe</label>
                <input type="password" formControlName="password" name="password" id="password">
            </div>
            <mat-card-footer> <button type="submit">Connexion</button></mat-card-footer>

        </form>
    </mat-card-content>
</mat-card>
